name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.14"]

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Install uv and Python
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install locked dependencies
        run: uv sync --frozen --extra mcp --group dev

      - name: Check lock file
        run: uv lock --check

      - name: Check formatting
        run: uv run --frozen ruff format --check .

      - name: Run lint
        run: uv run --frozen ruff check .

      - name: Run type checks
        run: uv run --frozen mypy src tests

      - name: Run offline tests
        run: uv run --frozen pytest -q

      - name: Build distributions
        run: uv build

      - name: Smoke test wheel
        shell: bash
        run: uv run --isolated --no-project --with dist/*.whl python -c "import tvfinance; print(tvfinance.__version__)"

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: true
      - run: uv sync --frozen --group docs
      - run: uv run --frozen mkdocs build --strict
