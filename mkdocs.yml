site_name: TVFinance
site_description: Market quotes, price history, news, and company information for Python
site_url: https://henrikxyz.github.io/TVFinance/
repo_url: https://github.com/henrikxyz/TVFinance
repo_name: henrikxyz/TVFinance

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - User guide:
      - Python API: guide/python.md
      - CLI: guide/cli.md
      - MCP: guide/mcp.md
      - Persistent cache: guide/cache.md
  - API:
      - Client: api/client.md
      - Models: api/models.md
      - Tickers: api/tickers.md
  - Project:
      - Audit: project/audit.md
      - Provider compatibility: project/compatibility.md
      - Improvement roadmap: project/roadmap.md
  - Architecture:
      - Overview: architecture/overview.md
      - Quality gates: architecture/quality-gates.md
  - Development:
      - Contributing: development/contributing.md
      - Testing: development/testing.md

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: false

strict: true
